services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: agents_local_dev
      POSTGRES_DB: agents
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build: {context: ./backend, dockerfile: Dockerfile}
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://agents:agents_local_dev@postgres:5432/agents
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: [./backend:/app]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: {context: ./backend, dockerfile: Dockerfile}
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://agents:agents_local_dev@postgres:5432/agents
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - ${WORKSPACE_DIR:-~/Desktop/Lucas}:/workspace
    command: celery -A app.worker worker --loglevel=info --concurrency=4

  celery-beat:
    build: {context: ./backend, dockerfile: Dockerfile}
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://agents:agents_local_dev@postgres:5432/agents
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
    command: celery -A app.worker beat --loglevel=info --scheduler celery.beat:PersistentScheduler

volumes:
  postgres_data:
